# ============================================================================
# FILE: application.properties (FIXED)
# Location: src/main/resources/application.properties
# ============================================================================

# Server Configuration
server.port=8080
#server.servlet.context-path=/api

# =====================================================================
# DATABASE CONNECTION - CRITICAL: Must be before Flyway
# =====================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/roto_et_db
spring.datasource.username=postgres
spring.datasource.password=jkl
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# =====================================================================
# FLYWAY MIGRATION - RUNS FIRST (before JPA initialization)
# =====================================================================
# MUST be enabled and configured BEFORE JPA/Hibernate
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.table=flyway_schema_history
#spring.flyway.schemas=public

# Important: baseline-on-migrate should be FALSE if migrations exist
#spring.flyway.baseline-on-migrate=false
#spring.flyway.baseline-version=1

# Validation
#spring.flyway.validate-on-migrate=true
#spring.flyway.out-of-order=true

# Encoding
#spring.flyway.encoding=UTF-8

# Placeholder settings (if using ${} in migrations)
#spring.flyway.placeholder-replacement=false
#spring.flyway.repair-on-migrate=true

# =====================================================================
# JPA/HIBERNATE CONFIGURATION - RUNS AFTER Flyway
# =====================================================================
# CRITICAL: ddl-auto MUST be 'validate' (not 'create' or 'update')
# Let Flyway handle schema creation/updates
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Database dialect (NOT needed in latest Spring Boot, but doesn't hurt)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =====================================================================
# LOGGING - Debug Flyway issues
# =====================================================================
# =====================================================================
# LOGGING CONFIGURATION - Optimized (No debug noise)
# =====================================================================
logging.level.root=INFO
logging.level.com.rotopay=DEBUG
logging.level.com.rotopay.expensetracker=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.data=WARN
logging.level.org.hibernate.orm=WARN

# Turn OFF debug logging
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.hibernate.orm.core=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN


# Hibernate logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.orm.jpa=INFO

# =====================================================================
# FILE UPLOAD CONFIGURATION
# =====================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
pfa.file.upload-dir=./data/statements

# =====================================================================
# LLM CONFIGURATION (Ollama)
# =====================================================================
pfa.llm.endpoint=http://localhost:11434
pfa.llm.model=mistral
pfa.llm.timeout=30000

# =====================================================================
# JWT CONFIGURATION
# =====================================================================
pfa.jwt.secret=secret-key-for-production
pfa.jwt.expiration=86400000

# =====================================================================
# APPLICATION NAME
# =====================================================================
spring.application.name=Expense-Tracker

# =====================================================================
# DISPATCHER SERVLET CONFIGURATION
# =====================================================================
spring.mvc.dispatch-options-request=true
spring.web.resources.add-mappings=false
